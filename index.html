<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Path Simplifier</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css">
    <link rel="stylesheet" href="static/styles/styles.css">
</head>
<body>
    <div class="overlay"></div>

    <div class="page-wrapper">
        <h1>Path Simplifier</h1>

        <div class="controls">
            <button id="simplify-btn">Simplify Line</button>
            <button id="clear-btn">Clear Line</button>
        </div>

        <p class="info">
            Draw one polyline on the map using the draw tool on the left. Then click <strong>Simplify Line</strong> to display a simplified version in red.
        </p>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    <script src="https://unpkg.com/@turf/turf@7.3.0/turf.min.js"></script>
    <script src="static/js/script.js"></script>
</body>
</html>
